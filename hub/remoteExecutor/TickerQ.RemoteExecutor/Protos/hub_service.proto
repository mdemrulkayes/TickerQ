syntax = "proto3";
package tickerq.v1;
option csharp_namespace = "TickerQ.RemoteExecutor.Hub";

import "google/protobuf/timestamp.proto";

// gRPC service hosted on the Hub. RemoteExecutor calls this to fetch the
// active nodes/functions for the env tied to its API key + secret.
// (This proto is a duplicate of the Hub-side definition; types are inlined
// so this package doesn't depend on the dashboard common.proto.)
service HubService {
  rpc SyncNodesFunctions(SyncNodesFunctionsRequest) returns (SyncNodesFunctionsResponse);
  rpc GetRegisteredFunctions(GetRegisteredFunctionsRequest) returns (GetRegisteredFunctionsResponse);
}

enum HubTaskPriority {
  LONG_RUNNING = 0;
  HIGH = 1;
  NORMAL = 2;
  LOW = 3;
}

message SyncNodesFunctionsRequest {
  string node_name = 1;
  string callback_url = 2;
  repeated SyncFunctionDescriptor functions = 3;
  // SDK runtime identifier ("dotnet", "nodejs", ...). Hub stores this on the
  // NodeApplication row for the dashboard's per-node logo. Defaults to "dotnet"
  // when omitted.
  string sdk_type = 4;
}

message SyncFunctionDescriptor {
  string function_name = 1;
  string request_type = 2;
  string request_example_json = 3;
  HubTaskPriority task_priority = 4;
  string expression = 5;
}

message SyncNodesFunctionsResponse {
  string application_url = 1;
  string webhook_signature = 2;
}

message GetRegisteredFunctionsRequest {}

message GetRegisteredFunctionsResponse {
  string application_id = 1;
  string environment_id = 2;
  string environment_name = 3;
  string webhook_signature = 4;
  repeated HubNode nodes = 5;
}

message HubNode {
  string id = 1;
  string node_name = 2;
  string callback_url = 3;
  reserved 4; reserved "is_synced";
  reserved 5; reserved "auto_sync";
  bool auto_migrate_expressions = 6;
  optional google.protobuf.Timestamp last_synced_at = 7;
  repeated HubFunction functions = 8;
}

message HubFunction {
  string id = 1;
  string function_name = 2;
  string request_type = 3;
  string request_example_json = 4;
  string node_expression = 5;
  HubTaskPriority task_priority = 6;
  optional google.protobuf.Timestamp applied_at = 7;
  bool is_active = 8;
}
